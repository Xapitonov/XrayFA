name: Android CI

on:
  push:
    branches: [ "main" ]
    tags: 
    - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    # Required permission to create a GitHub Release
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Decode keystore
      run: |
        echo "$KEYSTORE_BASE64" | base64 --decode > app/xrayfa.jks
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    - name: Setup Golang
      uses: actions/setup-go@v5.4.0
      with:
        go-version-file: './AndroidLibXrayLite/go.mod'

    - name: Install gomobile
      run: |
        go install golang.org/x/mobile/cmd/gobind@latest
        go install golang.org/x/mobile/cmd/gomobile@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Setup EXACT NDK for Reproducibility
      run: |
        wget -qO android-ndk.zip https://dl.google.com/android/repository/android-ndk-r27-linux.zip
        unzip -q android-ndk.zip
        rm android-ndk.zip
          
        echo "ANDROID_NDK_HOME=$(pwd)/android-ndk-r27" >> $GITHUB_ENV

    - name: Initialize Build Directory
      run: |
        sudo mkdir -p /build/build/com.android.xrayfa
        sudo chown -R $USER:$USER /build
        cp -a . /build/build/com.android.xrayfa/

    - name: Prepare AAR
      working-directory: /build/build/com.android.xrayfa
      env:
        ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        GOFLAGS: -buildvcs=false
        CGO_LDFLAGS: -Wl,--build-id=none
      run: |
        # Build AAR for xray
        cd AndroidLibXrayLite
        gomobile init
        go mod tidy -v

        CURRENT_PATH=$(pwd)
        export CGO_CFLAGS="-ffile-prefix-map=$CURRENT_PATH=."
        export CGO_CXXFLAGS="-ffile-prefix-map=$CURRENT_PATH=."

        # gomobile bind default name is libv2ray.aar for package libv2ray
        gomobile bind -v -trimpath -androidapi 21 -ldflags="-s -w -buildid=" ./

        mkdir -p ../app/libs
        cp libv2ray.aar ../app/libs/
    - name: Grant execute permission for gradlew
      working-directory: /build/build/com.android.xrayfa
      run: chmod +x gradlew
    - name: Build with Gradle
      working-directory: /build/build/com.android.xrayfa
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        ./gradlew assembleRelease --max-workers=1 --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: /build/build/com.android.xrayfa/app/build/outputs/apk/release/*.apk

# Auto-release step
    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/') # Only execute this step if triggered by a tag push
      with:
        files: /build/build/com.android.xrayfa/app/build/outputs/apk/release/*.apk # Directly use the path of the built APK
        generate_release_notes: true # Automatically generate release notes from PRs/commits
